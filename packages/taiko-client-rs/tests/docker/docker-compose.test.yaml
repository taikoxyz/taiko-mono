# Shared config for the two identical alethia-reth L2 nodes; each service below
# only overrides its container name and host port mappings.
#
# Images default to pulling their moving tags on every run so CI always tests
# against the current alethia-reth main; for fast local iteration export
# PULL_POLICY=missing to reuse the images already present on the daemon.
x-l2-node: &l2-node
  image: us-docker.pkg.dev/evmchain/images/alethia-reth:main
  pull_policy: ${PULL_POLICY:-always}
  volumes:
    - .:/host
  entrypoint:
    - ./alethia-reth
    - node
    - --http
    - --http.addr
    - "0.0.0.0"
    - --http.api
    - eth,net,debug,trace,rpc
    - --ws
    - --ws.addr
    - "0.0.0.0"
    - --chain
    - devnet
    - --disable-discovery
    - --authrpc.jwtsecret
    - /host/jwt.hex
    - --authrpc.addr
    - "0.0.0.0"
    - -vvvv

services:
  l1_node:
    container_name: l1_node
    image: ghcr.io/foundry-rs/foundry:stable
    pull_policy: ${PULL_POLICY:-always}
    ports:
      - "18545:8545"
    entrypoint:
      - anvil
      - --host
      - "0.0.0.0"
      - --gas-limit
      - "200000000"

  l2_node_0:
    <<: *l2-node
    container_name: l2_node_0
    ports:
      - "28545:8545"
      - "28546:8546"
      - "28551:8551"

  l2_node_1:
    <<: *l2-node
    container_name: l2_node_1
    ports:
      - "38545:8545"
      - "38546:8546"
      - "38551:8551"
