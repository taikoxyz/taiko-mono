nextest-version = "0.9.104"

[profile.default]
# Flag-only slow backstop for the whole suite (mostly unit tests): a test still
# running after 60s is reported as SLOW in the output so a hang surfaces in CI
# logs. Deliberately NO `terminate-after` here — a slow *unit* test is a bug that
# should fail loudly in review, not be silently killed and masked.
slow-timeout = { period = "60s" }

[[profile.default.overrides]]
# The L1-shared group covers everything that touches the dockerized L1/L2 env:
#   1. All integration test binaries (`kind(test)` — any target under a `tests/`
#      dir), which race on shared node state if run concurrently.
#   2. The whitelist crate's docker_* `--lib` tests. `kind(test)` does NOT match
#      a crate's own unit-test binary, so the second clause is required to pull
#      in the drain test in
#      `crates/whitelist-preconfirmation-driver/src/importer/tests.rs`.
# Both clauses share this single override because they need the exact same
# policy (serialize + retry + hang-kill). nextest evaluates overrides per-setting
# and does NOT inherit settings across override entries, so folding them into one
# filterset is both cleaner and avoids the duplicate-block drift hazard of
# repeating `retries`/`slow-timeout` on two entries.
filter = 'kind(test) or (package(whitelist-preconfirmation-driver) and test(docker_))'
# Serialize: max-threads = 1 on the group (below) forces one-at-a-time execution.
test-group = "l1-shared"
# Retry docker-backed tests: they depend on real node timing and are flaky in a
# way unit tests are not. Exponential backoff (5s, then 10s) gives a wedged node
# a moment to recover between attempts.
retries = { backoff = "exponential", count = 2, delay = "5s" }
# Hang backstop for the docker group: flag as SLOW at 2min (well above the
# longest legitimate e2e), then KILL after 5 periods (10min total) so a
# deterministically-hung test cannot pin the CI job to its wall-clock limit.
slow-timeout = { period = "120s", terminate-after = 5 }

[test-groups.l1-shared]
max-threads = 1
