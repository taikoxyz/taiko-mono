[workspace]
members = [
    "bin/client",
    "crates/bindings",
    "crates/driver",
    "crates/preconfirmation-driver",
    "crates/proposer",
    "crates/protocol",
    "crates/rpc",
    "crates/test-harness",
    "crates/whitelist-preconfirmation-driver",
]
resolver = "2"

[workspace.package]
version = "2.0.0"
edition = "2024"
rust-version = "1.93"
authors = ["Taiko Labs"]
license = "MIT"
repository = "https://github.com/taikoxyz/taiko-mono"

[workspace.dependencies]
# async
async-trait = "0.1"
rand = { version = "0.9.2", features = ["std", "std_rng"] }
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
tokio-retry = "0.3.0"
tokio-stream = "0.1"

# cli
clap = { version = "4", features = ["derive", "env"] }

# observability
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.16.2", default-features = false, features = [
  "http-listener",
] }
metrics-util = "0.19"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# web
http-body-util = "0.1"
hyper = { version = "1", features = ["client", "http1"] }
hyper-util = { version = "0.1", features = ["client", "http1", "tokio"] }
tower = { version = "0.5", features = ["timeout", "util"] }

# ethereum
alloy = { version = "1.4.3", default-features = false }
alloy-consensus = { version = "1.4.3", default-features = false, features = [
  "serde",
] }
alloy-contract = { version = "1.4.3", default-features = false }
alloy-eips = { version = "1.4.3", default-features = false }
alloy-hardforks = { version = "0.4.5", default-features = false }
alloy-json-rpc = { version = "1.4.3", default-features = false }
alloy-network = { version = "1.4.3", default-features = false }
alloy-node-bindings = { version = "1.4.3" }
alloy-primitives = { version = "1.5.0", default-features = false }
alloy-provider = { version = "1.4.3", default-features = false }
alloy-rlp = { version = "0.3.12", default-features = false }
alloy-rpc-client = { version = "1.4.3", default-features = false }
alloy-rpc-types = { version = "1.4.3", default-features = false }
alloy-rpc-types-engine = { version = "1.4.3", default-features = false }
alloy-rpc-types-engine-2 = { package = "alloy-rpc-types-engine", version = "2.0.1", default-features = false }
alloy-rpc-types-eth = { version = "1.4.3", default-features = false }
alloy-signer = { version = "1.4.3", default-features = false }
alloy-signer-local = { version = "1.4.3", default-features = false }
alloy-sol-macro = { version = "1.4.3", default-features = false, features = [
  "json",
] }
alloy-sol-types = { version = "1.5.0", default-features = false }
alloy-transport = { version = "1.4.3", default-features = false }
alloy-transport-http = { version = "1.4.3", features = ["hyper", "jwt-auth"] }
base-tx-manager = { git = "https://github.com/base/base", rev = "1f1149cca0748f7ee7c6234f54d0be8dab51579a" }
event-scanner = "1.1.0"
jsonrpsee = { version = "0.26", features = ["server"] }
k256 = { version = "0.13", default-features = false, features = ["arithmetic"] }
robust-provider = "1.0.1"

# taiko
alethia-reth-consensus = { git = "https://github.com/taikoxyz/alethia-reth", package = "alethia-reth-consensus", rev = "d1e831837fddfe6dbf8f7e43a77488316f1458bc", default-features = false }
alethia-reth-primitives = { git = "https://github.com/taikoxyz/alethia-reth", package = "alethia-reth-primitives", rev = "d1e831837fddfe6dbf8f7e43a77488316f1458bc", default-features = false, features = [
  "serde",
] }
alethia-reth-rpc-types = { git = "https://github.com/taikoxyz/alethia-reth", package = "alethia-reth-rpc-types", rev = "d1e831837fddfe6dbf8f7e43a77488316f1458bc" }

# networking
arc-swap = "1.7"
axum = { version = "0.7", features = ["ws"] }
bytes = "1"
discv5 = "0.10"
futures = "0.3"
hashlink = "0.10"
http = "1"
http-body = "1"
jsonwebtoken = "10"
kona-gossip = { git = "https://github.com/ethereum-optimism/optimism", package = "kona-gossip", tag = "kona-node/v1.2.9", default-features = false }
libp2p = { version = "0.56.0", features = [
  "tcp",
  "dns",
  "gossipsub",
  "ping",
  "identify",
  "noise",
  "yamux",
  "macros",
  "tokio",
] }
snap = "1.1"
ssz = { package = "ethereum_ssz", version = "0.9.1" }
tower-http = { version = "0.6", features = ["cors"] }

# types
anyhow = "1"
dashmap = "6.1.0"
flate2 = { version = "1.0", default-features = false, features = ["zlib"] }
once_cell = "1.19"
reqwest = { version = "0.12", features = ["json"] }
thiserror = { version = "2.0.12", default-features = false }
url = "2.5.4"

# serialization
secp256k1 = { version = "0.30", features = ["recovery", "rand"] }
serde_json = "1"
sha2 = "0.10"
ssz_rs = "0.9.0"

# testing
serial_test = { version = "3", features = ["async"] }
test-context = "0.3"
test-log = { version = "0.2", features = ["trace"] }

[profile.dev]
debug = "line-tables-only"
split-debuginfo = "unpacked"

[profile.dev.package]
proptest.opt-level = 3
rand_chacha.opt-level = 3
rand_xorshift.opt-level = 3
unarray.opt-level = 3

[profile.debug-fast]
inherits = "release"
debug = true
lto = "thin"

[profile.maxperf]
inherits = "release"
lto = "fat"
codegen-units = 1
incremental = false
