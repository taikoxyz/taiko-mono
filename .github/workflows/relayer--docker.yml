name: "Build and Push Multi-Arch Docker Image (relayer)"

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main]
    tags:
      - "relayer-v*"
    paths:
      - "packages/relayer/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keyless GAR auth via Workload Identity Federation (replaces secrets.GAR_JSON_KEY).
  WIF_PROVIDER: projects/790288402401/locations/global/workloadIdentityPools/terraform-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: gar-github-action@evmchain.iam.gserviceaccount.com

jobs:
  push-relayer-docker-image:
    name: Build and push docker image
    runs-on: [arc-runner-set]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - name: Authenticate to Google Cloud (Workload Identity)
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_lifetime: 3600s
          create_credentials_file: false
      - name: Login to GAR
        uses: docker/login-action@v4
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
        with:
          version: v0.29.1
          cache-binary: false

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            us-docker.pkg.dev/evmchain/images/relayer
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PACKAGE=relayer
