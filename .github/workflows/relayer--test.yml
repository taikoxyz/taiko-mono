name: "Relayer CI"

permissions:
  contents: read
  # actions: write is required by styfle/cancel-workflow-action below.
  actions: write

on:
  push:
    branches: [main]
    paths:
      - "packages/relayer/**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "packages/relayer/**"
      - "go.mod"
      - "go.sum"
      - "!**/*.md"
    branches-ignore:
      - release-please--branches--**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-relayer:
    name: lint-relayer
    if: >-
      github.event_name != 'pull_request'
      || (github.event.pull_request.draft == false
          && !startsWith(github.head_ref, 'release-please')
          && !startsWith(github.head_ref, 'dependabot'))
    # SECURITY: route fork PRs to a hosted runner where the first step exits 1.
    # The required check turns red for fork PRs (instead of silently skipping
    # as success) without ever running PR-controlled code on arc-runner-set.
    runs-on: >-
      ${{
        (github.event_name == 'pull_request'
         && github.event.pull_request.head.repo.fork == true)
        && 'ubuntu-latest' || 'arc-runner-set'
      }}
    steps:
      - name: Block fork PR CI on self-hosted runners
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
        run: |
          echo "::error::Fork PR CI on self-hosted runners is disabled for security."
          echo "::error::A maintainer must move this CI to a hosted-runner job or trigger from a trusted ref."
          exit 1
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod download
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Optional: version of golangci-lint to use in form of v1.2 or v1.2.3 or `latest` to use the latest version
          version: latest

          # Optional: working directory, useful for monorepos
          working-directory: ./packages/relayer
          args: --config=.golangci.yml --timeout=4m

  test-relayer:
    if: >-
      github.event_name != 'pull_request'
      || (github.event.pull_request.draft == false
          && !startsWith(github.head_ref, 'release-please')
          && !startsWith(github.head_ref, 'dependabot'))
    # SECURITY: see lint-relayer for the dynamic runs-on rationale.
    runs-on: >-
      ${{
        (github.event_name == 'pull_request'
         && github.event.pull_request.head.repo.fork == true)
        && 'ubuntu-latest' || 'arc-runner-set'
      }}
    steps:
      - name: Block fork PR CI on self-hosted runners
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
        run: |
          echo "::error::Fork PR CI on self-hosted runners is disabled for security."
          echo "::error::A maintainer must move this CI to a hosted-runner job or trigger from a trusted ref."
          exit 1

      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: relayer - Unit Tests
        working-directory: ./packages/relayer
        run: go test `go list ./... | grep -v ./contracts | grep -v ./mock | grep -v ./cmd` -timeout=20m -coverprofile=coverage.txt -covermode=atomic

      - name: relayer - Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./packages/relayer/coverage.txt
          flags: relayer
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
