name: Repo Docs Freshness Audit

on:
  schedule:
    - cron: "0 9 * * 1" # Weekly on Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: repo-docs-freshness-audit
  cancel-in-progress: false

jobs:
  docs-freshness-audit:
    if: github.repository == 'taikoxyz/taiko-mono'
    runs-on: [arc-runner-set]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install docs audit dependencies
        run: |
          npm install --ignore-scripts --no-save --no-package-lock \
            @anthropic-ai/claude-agent-sdk@latest \
            tsx@latest \
            typescript@latest \
            @types/node@latest

      - name: Run weekly docs audit agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx tsc --pretty false --noEmit --skipLibCheck --target ES2022 --module NodeNext --moduleResolution NodeNext .github/scripts/weekly-docs-audit.ts
          npx tsx .github/scripts/weekly-docs-audit.ts

      - name: Open docs proposal PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/docs-weekly-audit
          delete-branch: true
          draft: true
          commit-message: "docs: weekly freshness updates"
          title: "docs: weekly documentation freshness updates"
          body: |
            This PR was generated by the weekly docs freshness audit workflow.

            Scope:
            1. Important additions that should be documented
            2. Removals or obsolete docs content that should be cleaned up
            3. Clarity and simplification improvements

            Trigger:
            - Weekly schedule
            - Manual workflow dispatch
          labels: documentation,automation
          add-paths: |
            **/AGENTS.md
            **/CLAUDE.md
            **/README.md
            docs/**
            **/docs/**
