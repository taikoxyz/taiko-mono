name: "ARC Runner Mold Smoke"

on:
  workflow_dispatch:

jobs:
  mold-smoke:
    name: mold smoke
    runs-on: [arc-runner-set]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install mold
        shell: bash
        run: |
          set -euxo pipefail
          MOLD_VERSION=2.40.4
          ARCH="$(uname -m)"

          if [ "$(whoami)" = root ]; then
            SUDO=""
          else
            SUDO="sudo"
          fi

          curl -fsSL "https://github.com/rui314/mold/releases/download/v${MOLD_VERSION}/mold-${MOLD_VERSION}-${ARCH}-linux.tar.gz" \
            | $SUDO tar -C /usr/local --strip-components=1 --no-overwrite-dir -xzf -

          if [ "$(realpath /usr/bin/ld)" != /usr/local/bin/mold ]; then
            $SUDO ln -sf /usr/local/bin/mold "$(realpath /usr/bin/ld)"
          fi

      - name: Verify mold
        shell: bash
        run: |
          set -euxo pipefail
          which mold
          mold --version
          realpath /usr/bin/ld
