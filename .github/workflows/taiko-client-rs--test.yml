name: "CI"
permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "packages/taiko-client-rs/**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "packages/taiko-client-rs/**"
      - "!**/*.md"
    branches-ignore:
      - release-please--branches--**

concurrency:
  group: taiko-client-rs-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: ${{ github.event_name == 'push' || (github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository && !startsWith(github.head_ref, 'release-please') && !startsWith(github.head_ref, 'dependabot')) }}
    name: Lint
    runs-on: [arc-runner-set]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Ensure native build tools
        shell: bash
        run: |
          set -euxo pipefail

          if command -v cc > /dev/null 2>&1 && command -v llvm-config > /dev/null 2>&1; then
            cc --version
            echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ "$(whoami)" = root ]; then
            SUDO=""
          else
            SUDO="sudo"
          fi

          if command -v apt-get > /dev/null 2>&1; then
            $SUDO apt-get update
            $SUDO apt-get install -y build-essential pkg-config clang libclang-dev llvm-dev
          else
            echo "ERROR: apt-get is required to install build tools on this runner"
            exit 1
          fi

          cc --version
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-09-27
          components: clippy, rustfmt

      - name: Setup just
        uses: extractions/setup-just@v3
        with:
          just-version: 1.5.0

      - name: Install cargo-sort
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-sort

      - name: Check formatting
        working-directory: packages/taiko-client-rs
        run: just fmt-check

      - name: Check clippy
        working-directory: packages/taiko-client-rs
        run: just clippy

  test:
    if: ${{ github.event_name == 'push' || (github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository && !startsWith(github.head_ref, 'release-please')) }}
    name: Tests
    runs-on: [arc-runner-set]
    timeout-minutes: 30
    env:
      PROTOCOL_FORK_DIR: protocol-taiko-mono

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Ensure native build tools
        shell: bash
        run: |
          set -euxo pipefail

          if command -v cc > /dev/null 2>&1 && command -v llvm-config > /dev/null 2>&1; then
            cc --version
            echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ "$(whoami)" = root ]; then
            SUDO=""
          else
            SUDO="sudo"
          fi

          if command -v apt-get > /dev/null 2>&1; then
            $SUDO apt-get update
            $SUDO apt-get install -y build-essential pkg-config clang libclang-dev llvm-dev
          else
            echo "ERROR: apt-get is required to install build tools on this runner"
            exit 1
          fi

          cc --version
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Install mold
        shell: bash
        run: |
          set -euxo pipefail
          if [ "$(whoami)" = root ]; then
            SUDO=""
          else
            SUDO="sudo"
          fi

          if ! command -v apt-get > /dev/null 2>&1; then
            echo "ERROR: apt-get is required to install mold on this runner"
            exit 1
          fi

          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends mold

          if [ "$(readlink -f /usr/bin/ld)" != "$(readlink -f "$(command -v mold)")" ]; then
            $SUDO ln -sf "$(command -v mold)" /usr/bin/ld
          fi

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-09-27
          components: clippy, rustfmt

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            ${{ env.PROTOCOL_FORK_DIR }}/pnpm-lock.yaml

      - name: Setup just
        uses: extractions/setup-just@v3
        with:
          just-version: 1.5.0

      - uses: taiki-e/install-action@nextest

      - name: Checkout protocol for testing
        uses: actions/checkout@v6
        with:
          repository: taikoxyz/taiko-mono
          path: ${{ env.PROTOCOL_FORK_DIR }}
          ref: taiko-alethia-protocol-v3.0.0
          persist-credentials: false

      - name: Install pnpm dependencies for protocol taiko-mono for testing
        working-directory: ${{ env.PROTOCOL_FORK_DIR }}
        run: cd ./packages/protocol && pnpm install

      - name: Run tests
        working-directory: packages/taiko-client-rs
        env:
          PROTOCOL_DIR: ${{ github.workspace }}/${{ env.PROTOCOL_FORK_DIR }}/packages/protocol
        run: just test
