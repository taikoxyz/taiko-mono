packages:
  - packages/*
allowBuilds:
  "@reown/appkit": true
  "@sveltejs/kit": true
  bufferutil: true
  es5-ext: true
  esbuild: true
  keccak: true
  lefthook: true
  optimism: true
  "optimism@https://codeload.github.com/ethereum-optimism/optimism/tar.gz/ab3a54febb36398539fd3b849c222b7e70169dc8": true
  protobufjs: true
  secp256k1: true
  sharp: true
  svelte-preprocess: true
  unrs-resolver: true
  utf-8-validate: true
onlyBuiltDependencies:
  - "@reown/appkit"
  - "@sveltejs/kit"
  - bufferutil
  - es5-ext
  - esbuild
  - keccak
  - lefthook
  - optimism
  - protobufjs
  - secp256k1
  - sharp
  - svelte-preprocess
  - unrs-resolver
  - utf-8-validate
